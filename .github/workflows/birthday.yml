name: Briefer fødselsdage

on:
  schedule:
    - cron: "0 5 * * *"  # Kl. 07:00 dansk tid hver dag
  workflow_dispatch:

jobs:
  birthday-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer afhængigheder
        run: pip install requests

      - name: Tjek fødselsdage
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python birthday.py
